spring:
  application:
    name: gpu-scheduler

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:192.168.134.128}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 数据库基础配置
  datasource:
    # 指定 Druid 数据源类型
    type: com.alibaba.druid.pool.DruidDataSource
    # Druid 驱动类（适配 MySQL 8.x，若用其他数据库需调整）
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://192.168.134.128:3306/rbac_test_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai"
    username: lin
    password: "N3w$tr0ngP@ss!"

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sakurain.gpuscheduler.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT 配置
jwt:
  secret-key: ${JWT_SECRET_KEY:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters-long}
  access-token-expiration: 86400000      # 24 小时（毫秒）
  refresh-token-expiration: 604800000    # 7 天（毫秒）
  issuer: gpu-scheduler
  header-name: Authorization
  token-prefix: "Bearer "

# 限流配置
rate-limit:
  login:
    capacity: 5           # 登录接口：每 IP 每分钟最多 5 次
    refill-duration: 60   # 令牌补充周期（秒）
  api:
    capacity: 100         # 通用接口：每用户/IP 每分钟最多 100 次
    refill-duration: 60

# 幂等性配置
idempotency:
  ttl: 86400              # 幂等键存活时间（秒），默认 24 小时