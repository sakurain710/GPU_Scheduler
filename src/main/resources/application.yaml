spring:
  application:
    name: gpu-scheduler

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 安全要求：数据库凭据必须由环境变量注入
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sakurain.gpuscheduler.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  # 安全要求：必须通过环境变量配置，不允许默认弱密钥
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  issuer: ${JWT_ISSUER:gpu-scheduler}
  header-name: Authorization
  token-prefix: "Bearer "

rate-limit:
  login:
    capacity: 5
    refill-duration: 60
  api:
    capacity: 100
    refill-duration: 60
  # 认证接口在Redis不可用时默认fail-closed
  fail-closed-auth: true

idempotency:
  ttl: 86400

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

telemetry:
  topic: /topic/telemetry
  initial-delay-ms: 5000
  push-interval-ms: 3000

task-submission:
  high-priority-threshold: 9
  max-active-tasks-per-user: 3
  approver-roles:
    - ROLE_ADMIN
    - ROLE_SUPER_ADMIN

scheduler:
  age-weight-per-minute: 0.1
  refresh-interval-ms: 60000
  aging-enabled: true
  orphan-running-threshold-seconds: 120

task-retry:
  enabled: true
  max-retries: 3
  initial-backoff-seconds: 30
  batch-size: 100
  scan-interval-ms: 5000
